workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - test

default:
  image: oven/bun
  interruptible: true
  cache:
    key:
      files:
        - bun.lock
    paths:
      - .bun/install/cache/
      - node_modules/
  before_script:
    - bun install --frozen-lockfile

variables:
  BUN_INSTALL_CACHE_DIR: .bun/install/cache
  NUXT_TELEMETRY_DISABLED: '1'

test:typecheck:
  stage: test
  script:
    - bun run typecheck

test:unit:
  stage: test
  script:
    - bun test
